<!DOCTYPE html>
<html>
<head>
    <script type="text/javascript" src="jquery-3.7.1.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
          rel="stylesheet" 
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
          crossorigin="anonymous">
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" 
          crossorigin="anonymous"></script>

    <style type="text/css">

        #output {
            background-color: lightblue;
            padding: 10px;
        }
        #output.disabled {
            background-color: red;
        }
        #option1 {
            margin: 10px;
            max-width: 1000px;
        }
    
    </style>
    <link rel="stylesheet" href="style.css">

    <div id="errorHolder"></div>

    <textarea id="option1" class="form-control areaInput"></textarea>
    <div id="addRule"></div>
    <div id="addChange"></div>
    <button id="testingBtn">Enter</button>
    <button id="testAbility">Check</button>

    <div id="output"></div>

</head>
<body>

    
<script src="rpgmode.js"></script>
<script type="text/javascript">

    let debug = false;
    let text = "";

    $("#testingBtn").on("click", function() {
        text = $("#option1").val();
        checkScore(text, $("#output"));
    })
    $(document).on("keydown", function(event) {
        // console.log(event.key);
        if (event.key == "Enter") {
            event.preventDefault();
            text = $("#option1").val();
            checkScore(text, $("#output"));
        }
    })
    $("#testAbility").on("click", function() {
        text = $("#option1").val();
        checkAbility(text, $("#output"));
    })

    function displayError(message, type) {
        console.log("is this working?");
        if (!message || message == "" || message == "undefined") {
            return;
        }

        let buttonHtml = "";
        if (type != "primary" || true) {
            buttonHtml = '<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>'
        }

        let thisDiv = $(`<div class="alert alert-${type} error">${message}${buttonHtml}</div>`);
        $("#errorHolder").append(thisDiv);
        setTimeout(() => {
            thisDiv.remove();
        }, 3000);
    }


</script>

</body>
</html>
